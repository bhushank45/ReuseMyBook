<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        .container{
            display: flex;
            margin: 20px;
            width: 700px;
            height: 700px;
            border: 2px solid;
            gap: 20px;
            justify-content: center;
            align-items: center;
            background: #F8FAFC;
        }
        .box{
            border: 2px solid;
            width: 100px;
            height: 100px;
            background: #FFFFFF;
        }
        .b2{
            background: #22C55E;
        }
        .b3{
            background: #15803D;
        }
        .b4{
            background: #E5E7EB;
        }
        .b5{
            background: #1F2937;
        }
        .b6{
            background: #6B7280;
        }
    </style>
</head>
<body>
    <pre>
        Background     | `#F8FAFC` |
        | Card           | `#FFFFFF` |
        | Primary Green  | `#22C55E` |
        | Dark Green     | `#15803D` |
        | Border         | `#E5E7EB` |
        | Main Text      | `#1F2937` |
        | Secondary Text | `#6B7280` |
    </pre>
    <div class="container">
        
        <div class="box"></div>
        <div class="box b2"></div>
        <div class="box b3"></div>
        <div class="box b4"></div>
        <div class="box b5"></div>
        <div class="box b6"></div>
        </div>
    </div>
</body>
</html>
